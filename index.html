                state.clearConfirmTimer = setTimeout(() => { btn.classList.remove('confirm-danger'); btn.title = '清空内容'; }, 3000);
            }
        };

        // ==================== TEXT WRAPPING ====================
        const wrapText = (ctx, text, maxW) => {
            const lines = [];
            const isCJK = (char) => /[\u4e00-\u9fa5\u3000-\u303f\uff00-\uffef]/.test(char);
            text.split('\n').forEach(p => {
                if (!p) { lines.push(''); return; }
                let line = '';
                let wordBuffer = '';
                for (let i = 0; i < p.length; i++) {
                    const char = p[i];
                    if (isCJK(char)) {
                        if (wordBuffer) {
                            const testLine = line + wordBuffer;
                            if (ctx.measureText(testLine).width > maxW && line.length) {
                                lines.push(line); line = wordBuffer;
                            } else { line = testLine; }
                            wordBuffer = '';
                        }
                        const testLine = line + char;
                        if (ctx.measureText(testLine).width > maxW && line.length) {
                            lines.push(line); line = char;
                        } else { line = testLine; }
                    } else if (/\s/.test(char)) {
                        if (wordBuffer) {
                            const testLine = line + wordBuffer;
                            if (ctx.measureText(testLine).width > maxW && line.length) {
                                lines.push(line); line = wordBuffer;
                            } else { line = testLine; }
                            wordBuffer = '';
                        }
                        line += char;
                    } else {
                        wordBuffer += char;
                    }
                }
                if (wordBuffer) {
                    const testLine = line + wordBuffer;
                    if (ctx.measureText(testLine).width > maxW && line.length) {
                        lines.push(line); line = wordBuffer;
                    } else { line = testLine; }
                }
                lines.push(line);
            });
            return lines;
        };

        // ==================== EXPORT IMAGE ====================
        const exportImage = async () => {
            const text = els.editor.value;
            if (!text.trim() && state.images.length === 0) { showToast('请输入内容或添加图片'); return; }
            els.exportBtn.disabled = true; showToast('正在生成...');
            const font = state.fonts[state.selectedFontIndex];
            let fontFamily = DEFAULT_BODY_FONT;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const pad = 40, cw = 440, fs = state.fontSize + 2, lh = Math.round(fs * state.lineHeight), bh = 44;
            const imgSize = 100, imgGap = 12;

            if (font?.type === 'upload' && font.id) {
                const l = state.loadedCustomFonts.get(font.id);
                if (l) { fontFamily = `"${l.familyName}"`; await document.fonts.load(`${fs}px ${fontFamily}`).catch(()=>{}); }
            } else if (font) {
                fontFamily = font.family;
                await document.fonts.load(`${fs}px ${fontFamily}`).catch(()=>{});
            }

            ctx.font = `${fs}px ${fontFamily}`;
            const textLines = wrapText(ctx, text, cw);
            const textHeight = textLines.length * lh;
            const imgRows = Math.ceil(state.images.length / 4);
            const imgAreaHeight = state.images.length > 0 ? (imgRows * imgSize + (imgRows - 1) * imgGap + pad) : 0;
            const cW = cw + pad * 2;
            const cH = Math.max(260, textHeight + pad * 2 + bh + imgAreaHeight);

            canvas.width = cW * dpr; canvas.height = cH * dpr; ctx.scale(dpr, dpr);
            ctx.fillStyle = getCurrentColors()[state.currentColor];
            ctx.fillRect(0, 0, cW, cH);

            ctx.strokeStyle = state.darkMode ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.025)';
            if (state.paperMode === 'lines') {
                for (let y = pad + 16; y < cH - bh - imgAreaHeight; y += 32) { ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(cW - pad, y); ctx.stroke(); }
            } else if (state.paperMode === 'grid') {
                for (let y = pad + 16; y < cH - bh - imgAreaHeight; y += 32) { ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(cW - pad, y); ctx.stroke(); }
                for (let x = pad; x < cW - pad; x += 32) { ctx.beginPath(); ctx.moveTo(x, pad + 16); ctx.lineTo(x, cH - bh - imgAreaHeight); ctx.stroke(); }
            }

            ctx.fillStyle = state.darkMode ? '#d4c4a8' : '#3a3a3a';
            ctx.font = `${fs}px ${fontFamily}`;
            ctx.textAlign = state.textAlign;
            const getX = () => {
                if (state.textAlign === 'center') return cW / 2;
                if (state.textAlign === 'right') return cW - pad;
                return pad;
            };
            textLines.forEach((l, i) => {
                const x = getX();
                ctx.fillText(l, x, pad + i * lh);
            });

            // Draw images
            if (state.images.length > 0) {
                const imgYStart = pad + textHeight + pad / 2;
                const imgsPerRow = 4;
                const totalImgWidth = imgsPerRow * imgSize + (imgsPerRow - 1) * imgGap;
                const imgXStart = (cW - totalImgWidth) / 2;

                for (let i = 0; i < state.images.length; i++) {
                    const row = Math.floor(i / imgsPerRow);
                    const col = i % imgsPerRow;
                    const ix = imgXStart + col * (imgSize + imgGap);
                    const iy = imgYStart + row * (imgSize + imgGap);
                    try {
                        const img = new Image();
                        img.src = state.images[i].dataUrl;
                        await new Promise((res) => { img.onload = res; img.onerror = res; });
                        ctx.drawImage(img, ix, iy, imgSize, imgSize);
                        // Rounded corners clip
                        ctx.strokeStyle = state.darkMode ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(ix, iy, imgSize, imgSize);
                    } catch(e) {}
                }
            }

            ctx.font = '500 10px system-ui'; ctx.fillStyle = state.darkMode ? '#9a8e7e' : '#bbb';
            const barY = cH - bh + 4;
            ctx.textAlign = 'left';
            if (state.showDate) ctx.fillText(`${new Date().getFullYear()}年${new Date().getMonth()+1}月${new Date().getDate()}日`, pad, barY);
            ctx.textAlign = 'center'; ctx.fillText('便签', cW / 2, barY);

            const a = document.createElement('a');
            a.download = `便签_${new Date().toISOString().slice(0,10).replace(/-/g,'')}_${Date.now()}.png`;
            a.href = canvas.toDataURL('image/png'); a.click();
            showToast('图片已导出'); els.exportBtn.disabled = false;
        };

        // ==================== STORAGE ====================
        const saveToStorage = async () => {
            // 同步图片到 IndexedDB
            try {
                for (const img of state.images) {
                    await AssetDB.putImage(img);
                }
            } catch (e) {
                console.warn('IndexedDB 保存图片失败', e);

            const data = {

                fontSize: state.fontSize, lineHeight: state.lineHeight, showDate: state.showDate,
                settingsOpen: state.settingsOpen, globalFontEnabled: state.globalFontEnabled,
                darkMode: state.darkMode, locked: state.locked, textAlign: state.textAlign,
                countMode: state.countMode, selectedFontIndex: state.selectedFontIndex,
                customFonts: state.customFonts.map(f => ({ id: f.id, name: f.name, family: f.family, type: f.type })),
                imageIds: state.images.map(img => img.id),

            };
            try {

        };

        const migrateData = (data) => {
            if (!data.version) data.version = CURRENT_VERSION;
            return data;
        };

        const loadFromStorage = async () => {
            try {
                const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('memo_v13') || localStorage.getItem('memo_v12');
                if (!raw) return;
                let d = JSON.parse(raw);
                d = migrateData(d);
                if (d.customFonts && Array.isArray(d.customFonts)) {
                    // 先清理之前加载的自定义字体，避免重复
                    state.fonts = state.fonts.filter(f => f.type !== 'upload');
                    state.customFonts = [];
                    state.loadedCustomFonts.clear();
                    for (const cf of d.customFonts) {
                        // 兼容旧数据：如果包含 src，说明是旧格式，迁移到 IndexedDB
                        if (cf.src) {
                            const fontId = cf.id || ('font_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10));
                            const fontMeta = { id: fontId, name: cf.name, family: cf.family, type: 'upload' };
                            const fontData = { id: fontId, name: cf.name, family: cf.family, type: 'upload', src: cf.src };
                            try {
                                await AssetDB.putFont(fontData);
                                const buf = base64ToArrayBuffer(cf.src);
                                const ff = new FontFace(cf.name, buf);
                                await ff.load();
                                document.fonts.add(ff);
                                state.loadedCustomFonts.set(fontId, { familyName: cf.name, fontObj: ff, src: cf.src });
                                state.customFonts.push(fontMeta);
                                state.fonts.push(fontMeta);
                            } catch (e) { console.warn('字体迁移失败', cf.name, e); }
                        } else if (cf.id) {
                            // 新格式：从 IndexedDB 读取 src
                            try {
                                const fontData = await AssetDB.getFont(cf.id);
                                if (fontData && fontData.src) {
                                    const buf = base64ToArrayBuffer(fontData.src);
                                    const ff = new FontFace(cf.name, buf);
                                    await ff.load();
                                    document.fonts.add(ff);
                                    state.loadedCustomFonts.set(cf.id, { familyName: cf.name, fontObj: ff, src: fontData.src });
                                    state.customFonts.push({ id: cf.id, name: cf.name, family: cf.family, type: 'upload' });
                                    state.fonts.push({ id: cf.id, name: cf.name, family: cf.family, type: 'upload' });
                                }
                            } catch (e) { console.warn('字体加载失败', cf.name, e); }
                        }
                    }
                    // 重新构建下拉框以显示加载的字体
                    buildDropdown();
                }
                if (d.text !== undefined) els.editor.value = d.text;
                if (d.color && getCurrentColors()[d.color]) {
                    state.currentColor = d.color;

                }
                if (d.paperMode) {
                    state.paperMode = d.paperMode;

                }
                // 修复：安全转换数值，避免字符串调用 .toFixed() 崩溃
                if (d.fontSize !== undefined) {
                    const fs = parseInt(d.fontSize, 10);
                    if (!isNaN(fs)) {
                        state.fontSize = fs;
                        els.fontSizeSlider.value = fs;
                        els.fontSizeValue.textContent = fs;
                    }
                }
                if (d.lineHeight !== undefined) {
                    const lh = parseFloat(d.lineHeight);

                        state.lineHeight = lh;
                        els.lineHeightSlider.value = lh;
                        els.lineHeightValue.textContent = lh.toFixed(2);

                if (typeof d.showDate === 'boolean') { state.showDate = d.showDate; els.dateToggle.checked = d.showDate; }
                if (typeof d.settingsOpen === 'boolean') {

                if (typeof d.darkMode === 'boolean') {
                    state.darkMode = d.darkMode;
                    document.body.classList.toggle('dark-mode', d.darkMode);
                    els.darkModeBtn.classList.toggle('active', d.darkMode);
                    els.darkModeBtn.setAttribute('aria-pressed', d.darkMode);
                }
                if (typeof d.locked === 'boolean') {
                    state.locked = d.locked;
                    els.editor.readOnly = d.locked;
                    els.editor.classList.toggle('locked', d.locked);
                    els.lockBtn.classList.toggle('active', d.locked);
                    els.lockBtn.setAttribute('aria-pressed', d.locked);
                    els.lockIconUnlocked.style.display = d.locked ? 'none' : '';
                    els.lockIconLocked.style.display = d.locked ? '' : 'none';
                    els.stickyNote.classList.toggle('locked-note', d.locked);
                    els.lockOverlay.classList.toggle('show', d.locked);
                    els.toolbar.style.pointerEvents = d.locked ? 'none' : '';
                    els.toolbar.style.opacity = d.locked ? '0.5' : '';
                }
                if (d.textAlign && ['left','center','right'].includes(d.textAlign)) {
                    state.textAlign = d.textAlign;
                    els.editor.style.textAlign = d.textAlign;
                    document.querySelectorAll('.align-btn').forEach(b => {
                        const active = b.dataset.align === d.textAlign;
                        b.classList.toggle('active', active);
                        b.setAttribute('aria-checked', active);
                    });
                }
                if (typeof d.countMode === 'number') state.countMode = d.countMode;
                if (typeof d.selectedFontIndex === 'number' && !isNaN(d.selectedFontIndex) && d.selectedFontIndex >= 0 && d.selectedFontIndex < state.fonts.length) {
                    state.selectedFontIndex = d.selectedFontIndex;
                }
                buildDropdown();
                if (d.imageIds && Array.isArray(d.imageIds)) {
                    try {
                        const allImages = await AssetDB.getAllImages();
                        const idSet = new Set(d.imageIds);
                        state.images = allImages.filter(img => idSet.has(img.id));
                    } catch (e) {
                        console.warn('从 IndexedDB 读取图片失败', e);
                        state.images = [];
                    }
                    renderImageGallery();
                } else if (d.images && Array.isArray(d.images)) {
                    // 兼容旧数据：自动迁移到 IndexedDB
                    state.images = d.images;
                    for (const img of state.images) {
                        if (img.id) {
                            try { await AssetDB.putImage(img); } catch (e) {}
                        }
                    }
                    renderImageGallery();
                }
                els.globalFontCheckbox.checked = state.globalFontEnabled;
                els.globalFontSettingLabel.classList.toggle('active-label', state.globalFontEnabled);
                if (state.globalFontEnabled) applyGlobalFont();
                else { document.body.style.fontFamily = ''; document.documentElement.style.setProperty('--body-font', DEFAULT_BODY_FONT); }
                updateEditorStyle(); updateNoteColor(); applyFont(state.selectedFontIndex); updateCount();
                if (d.timestamp) { state.lastSavedTime = d.timestamp; updateLastSavedTime(); }
            } catch(e) { console.warn('加载失败', e); }
        };

        const scheduleSave = () => {
            if (state.isInitialLoad) return;
            state.isSaving = true; showSaveStatus(true);
            clearTimeout(state.saveTimer);
            state.saveTimer = setTimeout(() => {
                const doSave = async () => {
                    await saveToStorage();
                    state.isSaving = false;
                };
                if ('requestIdleCallback' in window) {
                    requestIdleCallback(() => doSave(), { timeout: 2000 });
                } else { doSave(); }
            }, 600);
        };

        const showSaveStatus = (loading, error) => {
            els.saveDot.classList.add('show');
            els.saveDot.classList.toggle('saving', loading);
            els.saveDot.style.background = error ? '#e74c3c' : (loading ? '#f39c12' : '#27ae60');
            if (!loading && !error) setTimeout(() => els.saveDot.classList.remove('show'), 1500);
        };

        const setupSystemTheme = () => {
            const mql = window.matchMedia('(prefers-color-scheme: dark)');
            const handler = (e) => {
                if (!state.userManuallyToggledDark && state.isInitialLoad) toggleDarkMode(e.matches);
            };
            mql.addEventListener('change', handler);
            if (!localStorage.getItem(STORAGE_KEY) && !localStorage.getItem('memo_v13') && !localStorage.getItem('memo_v12')) {
                if (mql.matches) toggleDarkMode(true);
            }
        };

        // ==================== EVENTS ====================
        const setupEvents = () => {
            els.fontTrigger.addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown(); });
            els.fontTrigger.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleDropdown(); }
                else if (e.key === 'ArrowDown' && !state.isDropdownOpen) { e.preventDefault(); toggleDropdown(true); }
            });
            els.fontDropdown.addEventListener('click', (e) => {
                // Don't select if clicking delete button
                if (e.target.closest('.font-delete-btn')) return;
                const li = e.target.closest('li[data-index]');
                if (li) selectFont(parseInt(li.dataset.index));
            });
            els.fontDropdown.addEventListener('keydown', (e) => {
                const items = getVisibleItems();
                if (!items.length) return;
                if (e.key === 'ArrowDown') { e.preventDefault(); state.focusedIndex = (state.focusedIndex + 1) % items.length; updateFocus(); scrollToFocused(); items[state.focusedIndex].focus(); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); state.focusedIndex = (state.focusedIndex - 1 + items.length) % items.length; updateFocus(); scrollToFocused(); items[state.focusedIndex].focus(); }
                else if (e.key === 'Enter') { 
                    e.preventDefault(); 
                    const focused = items[state.focusedIndex]; 
                    if (focused) {
                        // Check if focused element is a delete button
                        if (document.activeElement && document.activeElement.classList.contains('font-delete-btn')) {
                            const li = document.activeElement.closest('li[data-index]');
                            if (li) {
                                const font = state.fonts[parseInt(li.dataset.index)];
                                if (font && font.id) deleteCustomFont(font.id, parseInt(li.dataset.index));
                            }
                            return;
                        }
                        selectFont(parseInt(focused.dataset.index)); 
                    }
                }
                else if (e.key === 'Escape') { toggleDropdown(false); }
                else if (e.key === 'Home') { e.preventDefault(); state.focusedIndex = 0; updateFocus(); scrollToFocused(); items[0].focus(); }
                else if (e.key === 'End') { e.preventDefault(); state.focusedIndex = items.length - 1; updateFocus(); scrollToFocused(); items[items.length - 1].focus(); }
            });

            els.editor.addEventListener('input', () => { updateCount(); scheduleSave(); });
            els.editor.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); exportImage(); }
                if (e.ctrlKey && e.key === 'z' && !state.locked) { e.preventDefault(); undoClear(); }
            });
            els.editor.addEventListener('paste', handlePaste);

            els.noteCount.addEventListener('click', cycleCountMode);
            els.noteCount.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); cycleCountMode(); } });

            els.darkModeBtn.addEventListener('click', (e) => { e.stopPropagation(); state.userManuallyToggledDark = true; toggleDarkMode(); });
            els.lockBtn.addEventListener('click', toggleLock);
            els.globalFontCheckbox.addEventListener('change', () => toggleGlobalFont(els.globalFontCheckbox.checked));

            els.clearBtn.addEventListener('click', clearContent);
            els.clearBtn.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); clearContent(); } });

            els.settingsBtn.addEventListener('click', () => {
                state.settingsOpen = !state.settingsOpen;
                els.settingsPanel.classList.toggle('show', state.settingsOpen);
                els.settingsBtn.classList.toggle('active', state.settingsOpen);
                els.settingsBtn.setAttribute('aria-expanded', state.settingsOpen);
                scheduleSave();
            });

            els.alignBtns.addEventListener('click', (e) => {
                const btn = e.target.closest('.align-btn');
                if (btn) setTextAlign(btn.dataset.align);
            });

            els.colorPickBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleColorPanel(); });
            els.colorPickBtn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleColorPanel(); }
                else if (e.key === 'Escape' && state.colorPanelOpen) { toggleColorPanel(false); }
            });

            // Drag & drop
            els.editorWrap.addEventListener('dragover', handleDragOver);
            els.editorWrap.addEventListener('dragleave', handleDragLeave);
            els.editorWrap.addEventListener('drop', handleDrop);
            els.stickyNote.addEventListener('dragover', handleDragOver);
            els.stickyNote.addEventListener('dragleave', handleDragLeave);
            els.stickyNote.addEventListener('drop', handleDrop);

            // Image preview
            els.imgPreviewOverlay.addEventListener('click', closeImagePreview);
            els.imgPreviewClose.addEventListener('click', closeImagePreview);
            els.imgPreviewClose.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') closeImagePreview(); });

            // Share
            els.shareBtn.addEventListener('click', openSharePanel);
            els.shareClose.addEventListener('click', closeSharePanel);
            els.shareBackdrop.addEventListener('click', closeSharePanel);
            els.shareCopyBtn.addEventListener('click', copyShareUrl);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (els.sharePanel.classList.contains('show')) closeSharePanel();
                    if (els.imgPreviewOverlay.classList.contains('show')) closeImagePreview();
                }
            });

            document.addEventListener('click', (e) => {
                if (state.colorPanelOpen && !els.colorPickBtn.contains(e.target) && !els.colorPanel.contains(e.target)) toggleColorPanel(false);
                if (state.isDropdownOpen && !els.fontSelectWrap.contains(e.target) && !els.fontDropdown.contains(e.target)) toggleDropdown(false);
            });

            window.addEventListener('scroll', () => {
                if (state.colorPanelOpen) positionPanel(els.colorPickBtn, els.colorPanel);
                if (state.isDropdownOpen) positionPanel(els.fontTrigger, els.fontDropdown);
            }, { passive: true });
            window.addEventListener('resize', () => {
                if (state.colorPanelOpen) positionPanel(els.colorPickBtn, els.colorPanel);
                if (state.isDropdownOpen) positionPanel(els.fontTrigger, els.fontDropdown);
            });

            document.querySelectorAll('.paper-mode-btn').forEach(b => b.addEventListener('click', () => {
                document.querySelectorAll('.paper-mode-btn').forEach(x => { x.classList.remove('active'); x.setAttribute('aria-checked', 'false'); });
                b.classList.add('active');
                b.setAttribute('aria-checked', 'true');
                state.paperMode = b.dataset.mode;
                updatePaperTexture(); scheduleSave();
            }));

            els.fontSizeSlider.addEventListener('input', (e) => { state.fontSize = parseInt(e.target.value); els.fontSizeValue.textContent = state.fontSize; updateEditorStyle(); scheduleSave(); });
            els.lineHeightSlider.addEventListener('input', (e) => { state.lineHeight = parseFloat(e.target.value); els.lineHeightValue.textContent = state.lineHeight.toFixed(2); updateEditorStyle(); scheduleSave(); });
            els.dateToggle.addEventListener('change', () => { state.showDate = els.dateToggle.checked; scheduleSave(); });
            els.exportBtn.addEventListener('click', exportImage);
            window.addEventListener('beforeunload', () => { if (state.isSaving) saveToStorage(); });  // 同步调用，浏览器会等待
        };

        // ==================== INIT ====================
        const init = async () => {
            buildDropdown();
            buildColorPanel();
            setupSystemTheme();

            // Try load from hash first (shared link), then localStorage
            const loadedFromHash = await loadFromHash();
            if (!loadedFromHash) {
                await loadFromStorage();
            }

            applyFont(state.selectedFontIndex);
            setupEvents();
            updateEditorStyle();
            updatePaperTexture();
            updateNoteColor();
            if (state.globalFontEnabled) applyGlobalFont();
            if (state.darkMode) { document.body.classList.add('dark-mode'); els.darkModeBtn.classList.add('active'); els.darkModeBtn.setAttribute('aria-pressed', 'true'); }
            els.globalFontCheckbox.checked = state.globalFontEnabled;
            els.globalFontSettingLabel.classList.toggle('active-label', state.globalFontEnabled);
            if (!state.lastSavedTime) updateLastSavedTime();
            state.isInitialLoad = false;
        };

        init();
    })();
</script>
</body>
</html>
